AWSTemplateFormatVersion: "2010-09-09"
Description: Tableau Chat Assistant Extension PoC

Parameters:
  LambdaCodeS3Bucket:
    Type: String
    NoEcho: true
  LambdaCodeS3Key:
    Type: String
    NoEcho: true
  FrontendBucketName:
    Type: String
    NoEcho: true
  CorsAllowedOrigin:
    Type: String
    NoEcho: true
  TableauServerUrl:
    Type: String
    NoEcho: true
  TableauSiteContentUrl:
    Type: String
    NoEcho: true
    Default: ""
  TableauApiVersion:
    Type: String
    Default: "3.25"
  TableauConnectedAppClientId:
    Type: String
    NoEcho: true
  TableauConnectedAppSecretId:
    Type: String
    NoEcho: true
  TableauConnectedAppSecretValue:
    Type: String
    NoEcho: true
  TableauDefaultSubject:
    Type: String
    NoEcho: true
  TableauScopes:
    Type: String
    NoEcho: true
    Default: "tableau:content:read"
  TableauContextProvider:
    Type: String
    Default: "mock"
    AllowedValues:
      - mock
      - direct
      - direct-api
      - mcp
  AuthRequired:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  CognitoUserPoolId:
    Type: String
    NoEcho: true
    Default: ""
  CognitoClientId:
    Type: String
    NoEcho: true
    Default: ""
  CognitoRegion:
    Type: String
    Default: ""
  TableauMcpServerUrl:
    Type: String
    NoEcho: true
    Default: ""
  TableauMcpTransport:
    Type: String
    Default: "http"
  TableauMcpAuthMode:
    Type: String
    Default: "none"
  TableauMcpTimeoutMs:
    Type: Number
    Default: 5000

Resources:
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-chat-history"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  TableauConnectedAppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}/tableau-connected-app"
      SecretString: !Sub
        - '{"clientId":"${ClientId}","secretId":"${SecretId}","secretValue":"${SecretValue}"}'
        - ClientId: !Ref TableauConnectedAppClientId
          SecretId: !Ref TableauConnectedAppSecretId
          SecretValue: !Ref TableauConnectedAppSecretValue

  ChatFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-chat"
      RetentionInDays: 30

  HealthFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-health"
      RetentionInDays: 30

  BackendRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-backend-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: backend-runtime
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !Sub "${ChatFunctionLogGroup.Arn}:*"
                  - !Sub "${HealthFunctionLogGroup.Arn}:*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt ChatHistoryTable.Arn
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref TableauConnectedAppSecret

  ChatFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-chat"
      Runtime: nodejs22.x
      Handler: chatHandler.handler
      Role: !GetAtt BackendRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          CHAT_HISTORY_TABLE_NAME: !Ref ChatHistoryTable
          USE_IN_MEMORY_REPOSITORY: "false"
          CORS_ALLOWED_ORIGIN: !Ref CorsAllowedOrigin
          TABLEAU_SERVER_URL: !Ref TableauServerUrl
          TABLEAU_SITE_CONTENT_URL: !Ref TableauSiteContentUrl
          TABLEAU_API_VERSION: !Ref TableauApiVersion
          TABLEAU_CONNECTED_APP_SECRET_ARN: !Ref TableauConnectedAppSecret
          TABLEAU_DEFAULT_SUBJECT: !Ref TableauDefaultSubject
          TABLEAU_SCOPES: !Ref TableauScopes
          TABLEAU_CONTEXT_PROVIDER: !Ref TableauContextProvider
          AUTH_REQUIRED: !Ref AuthRequired
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          COGNITO_REGION: !Ref CognitoRegion
          TABLEAU_MCP_SERVER_URL: !Ref TableauMcpServerUrl
          TABLEAU_MCP_TRANSPORT: !Ref TableauMcpTransport
          TABLEAU_MCP_AUTH_MODE: !Ref TableauMcpAuthMode
          TABLEAU_MCP_TIMEOUT_MS: !Ref TableauMcpTimeoutMs

  HealthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-health"
      Runtime: nodejs22.x
      Handler: healthHandler.handler
      Role: !GetAtt BackendRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          CORS_ALLOWED_ORIGIN: !Ref CorsAllowedOrigin

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-http-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowCredentials: false
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - OPTIONS
          - GET
          - POST
        AllowOrigins:
          - !Ref CorsAllowedOrigin

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  ChatIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ChatFunction.Arn
      PayloadFormatVersion: "2.0"

  HealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt HealthFunction.Arn
      PayloadFormatVersion: "2.0"

  ChatRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /chat"
      Target: !Sub "integrations/${ChatIntegration}"

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /health"
      Target: !Sub "integrations/${HealthIntegration}"

  ChatInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ChatFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/chat"

  HealthInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HealthFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/health"

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref FrontendBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-frontend-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        IPV6Enabled: true
        Origins:
          - Id: frontend-s3-origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref FrontendOriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
          - Id: api-gateway-origin
            DomainName: !Sub "${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: frontend-s3-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: api-gateway-origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            Compress: true
            DefaultTTL: 0
            MaxTTL: 0
            MinTTL: 0
            ForwardedValues:
              QueryString: true
              Headers:
                - Authorization
                - Content-Type
                - Origin
              Cookies:
                Forward: all
            FunctionAssociations:
              - EventType: viewer-request
                FunctionARN: !GetAtt ApiPathRewriteFunction.FunctionMetadata.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  ApiPathRewriteFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${AWS::StackName}-api-rewrite-v2"
      AutoPublish: true
      FunctionConfig:
        Comment: Rewrite /api/* requests to the API Gateway default stage paths.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          request.uri = request.uri.replace(/^\/api/, "");
          return request;
        }

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"
